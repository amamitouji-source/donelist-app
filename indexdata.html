<!DOCTYPE html>

<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Done List</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: linear-gradient(135deg,#f3f4f6,#e0f2fe);
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 400px;
    }
    input {
      width: 70%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }
    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #60a5fa;
      color: white;
    }
    .item {
      background: #fff;
      padding: 8px;
      margin-top: 8px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="card">
    <h3>Done List</h3>
    <input id="input" placeholder="今天完成了什么"/>
    <button onclick="add()">+</button>
    <div id="list"></div>
  </div>

<script>
let data = JSON.parse(localStorage.getItem("done")||"[]");

function save(){
  localStorage.setItem("done",JSON.stringify(data));
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML="";
  data.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML = item + '<span onclick="del('+i+')">×</span>';
    list.appendChild(div);
  });
}

function add(){
  const input=document.getElementById("input");
  if(!input.value) return;
  data.unshift(input.value);
  input.value="";
  save();
  render();
}

function del(i){
  data.splice(i,1);
  save();
  render();
}

render();
</script>

</body>
</html>
